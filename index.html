<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Happy Graduate</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>
<body>

  <!-- VIDEO -->
  <video
    id="bgVideo"
    class="bg-video"
    muted
    loop
    playsinline
    preload="auto"
  >
    <source src="jumbo.mp4" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- MUSIC -->
  <audio id="music" loop>
    <source src="jumbo.mp3" type="audio/mp3">
  </audio>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-text">

      <h1>
        Happy Graduate
        id="typing"
      </h1>

      <p class="sub-text">
        Sebuah perjalanan indah telah berhasil kamu lewati.
      </p>

    </div>

  </section>

  <!-- MAIN CONTENT -->
  <section class="main-content" id="mainContent">

    <div class="message-box">

      <h2>
        Congratulations 🎓
      </h2>

      <p>
        Selamat atas pencapaian luar biasa ini.
        Semoga semua mimpi dan harapanmu
        berjalan seindah alam yang selalu
        membawa ketenangan dan harapan baru.
      </p>

      <!-- PHOTO -->
      <div class="photo-wrap">

        <img src="foto1.jpg" alt="photo">

        <img src="foto2.jpg" alt="photo">

      </div>

    </div>

  </section>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
